server:
  port: 8081
spring:
  application:
    name: flight-search-service
management:
  endpoints:
    web:
      exposure:
        include: health, info

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka